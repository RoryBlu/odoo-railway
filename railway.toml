[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Pass Mailgun SMTP configuration as command-line arguments using environment variables
startCommand = "/entrypoint.sh odoo --smtp=$MAILGUN_SMTP_HOST --smtp-port=$MAILGUN_SMTP_PORT --smtp-user=$MAILGUN_SMTP_USER --smtp-password=$MAILGUN_SMTP_PASSWORD --smtp-ssl --email-from=$MAILGUN_EMAIL_FROM"
# Run as odoo user (UID 101) for security
runAsUser = 101
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[mounts]
"/var/lib/odoo" = { volume = "odoo_data" }