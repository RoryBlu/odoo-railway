[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# SMTP can be configured through Odoo web interface after deployment
# Settings > Technical > Outgoing Mail Servers
# The official Odoo image entrypoint handles user switching and permissions
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[mounts]
"/var/lib/odoo" = { volume = "odoo_data" }