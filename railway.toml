[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# SMTP can be configured through Odoo web interface after deployment
# Settings > Technical > Outgoing Mail Servers
# Run as odoo user (UID 101) for security
runAsUser = 101
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[mounts]
"/var/lib/odoo" = { volume = "odoo_data" }